<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(title='7-Eleven - Order Products')}"></head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 min-h-screen">

<nav th:replace="~{fragments/nav-user :: nav-user}"></nav>

<div class="container mx-auto px-4 pb-8">

    <!-- Alert Messages -->
    <div th:if="${successMessage}" class="alert-modern alert-success-modern mb-6 fade-in">
        <i class="fas fa-check-circle mr-2"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-modern alert-danger-modern mb-6 fade-in">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Products Section -->
    <div class="mb-12">
        <h2 class="text-3xl font-bold mb-6 bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent fade-in">
            <i class="fas fa-shopping-bag"></i> Available Products
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="product, iterStat : ${products}"
                 class="product-card fade-in"
                 th:classappend="${iterStat.index == 0} ? 'fade-in' : (${iterStat.index == 1} ? 'fade-in-delay-1' : 'fade-in-delay-2')">

                <!-- Product Icon -->
                <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center">
                    <i class="fas fa-box text-white text-2xl"></i>
                </div>

                <!-- Product Info -->
                <h3 class="text-xl font-bold text-gray-800 mb-2 text-center" th:text="${product.name}"></h3>
                <p class="text-sm text-gray-500 mb-3 text-center">
                    SKU: <span class="font-mono" th:text="${product.sku}"></span>
                </p>

                <!-- Price -->
                <div class="text-center mb-3">
                    <span class="text-3xl font-bold bg-gradient-to-r from-green-600 to-teal-600 bg-clip-text text-transparent" th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')}"></span>
                    <span class="text-lg text-gray-600 ml-1">VND</span>
                </div>

                <!-- Stock -->
                <div class="flex items-center justify-center gap-2 text-gray-600">
                    <i class="fas fa-warehouse"></i>
                    <span>Stock: <span class="font-bold" th:text="${product.stockQuantity}"></span></span>
                </div>
            </div>

            <!-- Empty State: only show when no products -->
            <div th:if="${#lists.isEmpty(products)}" class="col-span-full text-center py-12">
                <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 text-lg">No products available.</p>
            </div>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages != null and totalPages > 1}" class="flex justify-center items-center gap-2 mt-8 fade-in">
            <!-- Previous Button -->
            <a th:if="${currentPage > 0}"
               th:href="@{/products(page=${currentPage - 1})}"
               class="btn-modern btn-primary-modern text-sm">
                <i class="fas fa-chevron-left"></i> Prev
            </a>

            <!-- First Page -->
            <a th:href="@{/products(page=0)}"
               th:class="${currentPage == 0} ? 'btn-modern bg-purple-600 text-white text-sm' : 'btn-modern btn-primary-modern text-sm'">
                1
            </a>

            <!-- Left Ellipsis -->
            <span th:if="${currentPage > 3}" class="text-gray-500 px-2">...</span>

            <!-- Pages around current page -->
            <span th:each="i : ${#numbers.sequence(
                (currentPage - 1 < 1 ? 1 : currentPage - 1),
                (currentPage + 1 >= totalPages - 1 ? totalPages - 2 : currentPage + 1)
            )}" th:if="${i >= 1 and i < totalPages - 1}">
                <a th:href="@{/products(page=${i})}"
                   th:text="${i + 1}"
                   th:class="${i == currentPage} ? 'btn-modern bg-purple-600 text-white text-sm' : 'btn-modern btn-primary-modern text-sm'">
                </a>
            </span>

            <!-- Right Ellipsis -->
            <span th:if="${currentPage < totalPages - 4}" class="text-gray-500 px-2">...</span>

            <!-- Last Page -->
            <a th:if="${totalPages > 1}"
               th:href="@{/products(page=${totalPages - 1})}"
               th:text="${totalPages}"
               th:class="${currentPage == totalPages - 1} ? 'btn-modern bg-purple-600 text-white text-sm' : 'btn-modern btn-primary-modern text-sm'">
            </a>

            <!-- Next Button -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/products(page=${currentPage + 1})}"
               class="btn-modern btn-primary-modern text-sm">
                Next <i class="fas fa-chevron-right"></i>
            </a>
        </div>
        <p class="text-center text-gray-500 text-sm mt-3"
           th:text="'Showing ' + ${#lists.size(products)} + ' of ' + ${totalElements != null ? totalElements : #lists.size(products)} + ' products'"></p>

    </div>

    <!-- Create Order Form -->
    <div class="max-w-3xl mx-auto" th:if="${!#lists.isEmpty(products)}">
        <div class="glass-card-dark p-8 rounded-2xl shadow-2xl fade-in">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">
                    <i class="fas fa-shopping-cart"></i> Create Your Order
                </h2>
                <p class="text-gray-300">Fill in your details and select products</p>
            </div>

            <form th:action="@{/orders}" th:object="${orderRequest}" method="post">

                <!-- Customer Info -->
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-user"></i> Customer Name *
                        </label>
                        <input type="text"
                               class="input-modern"
                               th:field="*{customerName}"
                               th:classappend="${#fields.hasErrors('customerName')} ? 'border-red-500'"
                               placeholder="Enter your name"
                               maxlength="50"
                               required>
                        <p class="text-red-400 text-sm mt-1" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></p>

                    </div>

                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-phone"></i> Phone Number *
                        </label>
                        <input type="tel"
                               class="input-modern"
                               th:field="*{customerPhone}"
                               th:classappend="${#fields.hasErrors('customerPhone')} ? 'border-red-500'"
                               placeholder="0123456789"
                               maxlength="15"
                               pattern="[0-9]{10,15}"
                               required>
                        <p class="text-red-400 text-sm mt-1" th:if="${#fields.hasErrors('customerPhone')}" th:errors="*{customerPhone}"></p>

                    </div>
                </div>

                <hr class="border-gray-600 my-6">

                <!-- Order Items -->
                <div class="mb-6">
                    <h3 class="text-xl font-bold text-white mb-4">
                        <i class="fas fa-list"></i> Order Items
                    </h3>
                    <div id="order-items" class="space-y-3">
                        <div class="flex gap-3 order-item-row">
                            <div class="flex-1">
                                <select class="input-modern" name="items[0].productId" required>
                                    <option value="">-- Select --</option>
                                    <option th:each="product : ${products}"
                                            th:value="${product.id}"
                                            th:text="${product.name} + ' (' + ${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' VND)'">
                                    </option>
                                </select>
                            </div>
                            <div class="w-24">
                                <input type="number"
                                       class="input-modern"
                                       name="items[0].quantity"
                                       min="1"
                                       placeholder="Qty"
                                       required>
                            </div>
                            <button type="button"
                                    class="btn-modern bg-red-500 text-white px-4"
                                    onclick="removeRow(this)">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>

                    <button type="button"
                            class="btn-modern bg-white text-purple-600 mt-4"
                            onclick="addItem()">
                        <i class="fas fa-plus"></i> Add Another Item
                    </button>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-modern btn-success-modern w-full text-lg py-4">
                    <i class="fas fa-check-circle mr-2"></i>
                    Place Order
                </button>
            </form>
        </div>
    </div>

    <div class="max-w-3xl mx-auto" th:if="${#lists.isEmpty(products)}">
        <div class="glass-card-dark p-8 rounded-2xl shadow-2xl fade-in text-center">
            <i class="fas fa-shopping-cart text-5xl text-gray-500 mb-4"></i>
            <h2 class="text-2xl font-bold text-white mb-2">Ordering is unavailable</h2>
            <p class="text-gray-300">There are no active products to order right now.</p>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer-user}"></footer>

<script>
    function getProducts() {
        const first = document.querySelector('#order-items select');
        return first ? first.innerHTML : '';
    }

    function reindexRows() {
        const rows = document.querySelectorAll('#order-items .order-item-row');
        rows.forEach((row, i) => {
            const select = row.querySelector('select');
            const input  = row.querySelector('input[type=number]');
            if (select) select.name = `items[${i}].productId`;
            if (input)  input.name  = `items[${i}].quantity`;
        });
    }

    function addItem() {
        const container = document.getElementById('order-items');
        const row = document.createElement('div');
        row.className = 'flex gap-3 order-item-row fade-in';
        row.innerHTML = `
            <div class="flex-1">
                <select class="input-modern" name="items[__i__].productId" required>
                    ${getProducts()}
                </select>
            </div>
            <div class="w-24">
                <input type="number" class="input-modern" name="items[__i__].quantity"
                       min="1" placeholder="Qty" required>
            </div>
            <button type="button" class="btn-modern bg-red-500 text-white px-4" onclick="removeRow(this)">
                <i class="fas fa-trash"></i>
            </button>
        `;
        container.appendChild(row);
        reindexRows();
    }

    function removeRow(button) {
        const container = document.getElementById('order-items');
        if (container.children.length > 1) {
            button.closest('.order-item-row').remove();
            reindexRows();
        } else {
            alert('Order must have at least one item!');
        }
    }
</script>
</body>
</html>
