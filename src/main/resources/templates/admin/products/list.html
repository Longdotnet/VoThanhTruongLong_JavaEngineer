<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(title='Admin - Product Management')}"></head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">

<!-- Admin Navigation -->
<nav th:replace="~{fragments/nav-admin :: nav-admin}"></nav>


<div class="container mx-auto px-4 pb-8">

    <!-- Header -->
    <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
        <h1 class="text-4xl font-bold text-white fade-in">
            <i class="fas fa-boxes"></i> Product Management
        </h1>
        <!-- DRY: baseUrl defined once in th:with below, but for static links use direct -->
        <a th:href="@{/admin/products/new}" class="btn-modern btn-success-modern">
            <i class="fas fa-plus-circle mr-2"></i>Add Product
        </a>
    </div>

    <!-- Alert Messages -->
    <div th:if="${successMessage}" class="alert-modern alert-success-modern mb-6 fade-in">
        <i class="fas fa-check-circle mr-2"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-modern alert-danger-modern mb-6 fade-in">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Products Table - Desktop -->
    <div class="hidden md:block table-modern fade-in">
        <table class="w-full">
            <thead>
                <tr>
                    <th class="px-6 py-4 text-left">ID</th>
                    <th class="px-6 py-4 text-left">Name</th>
                    <th class="px-6 py-4 text-left">SKU</th>
                    <th class="px-6 py-4 text-right">Price (VND)</th>
                    <th class="px-6 py-4 text-center">Stock</th>
                    <th class="px-6 py-4 text-center">Status</th>
                    <th class="px-6 py-4 text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}"
                    th:with="viewUrl=@{/admin/products/{id}(id=${product.id})},
                             editUrl=@{/admin/products/{id}/edit(id=${product.id})},
                             deleteUrl=@{/admin/products/{id}/delete(id=${product.id})}">
                    <td class="px-6 py-4 font-bold text-purple-600" th:text="${product.id}"></td>
                    <td class="px-6 py-4 font-semibold" th:text="${product.name}"></td>
                    <td class="px-6 py-4 font-mono text-sm text-gray-600" th:text="${product.sku}"></td>
                    <td class="px-6 py-4 text-right font-bold text-green-600"
                        th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></td>
                    <td class="px-6 py-4 text-center">
                        <span class="badge-modern badge-success-modern" th:text="${product.stockQuantity}"></span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span th:class="${product.status.name() == 'ACTIVE'} ? 'badge-modern badge-success-modern' : 'badge-modern badge-inactive-modern'"
                              th:text="${product.status}"></span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex gap-2 justify-center">
                            <a th:href="${viewUrl}"
                               class="btn-modern bg-blue-500 text-white text-xs px-3 py-2"
                               title="View Details">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="${editUrl}"
                               class="btn-modern bg-yellow-500 text-white text-xs px-3 py-2"
                               title="Edit Product">
                                <i class="fas fa-edit"></i>
                            </a>
                            <button type="button"
                                    class="btn-modern bg-red-500 text-white text-xs px-3 py-2"
                                    title="Delete Product"
                                    th:attr="data-delete-url=${deleteUrl},data-name=${product.name}"
                                    onclick="showDeleteModal(this.dataset.deleteUrl, this.dataset.name)">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="7" class="px-6 py-12 text-center text-gray-400">
                        <i class="fas fa-box-open text-6xl mb-4 block"></i>
                        <p class="text-lg">No products found.</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Products Cards - Mobile -->
    <div class="md:hidden space-y-4">
        <div th:each="product : ${products}"
             th:with="viewUrl=@{/admin/products/{id}(id=${product.id})},
                      editUrl=@{/admin/products/{id}/edit(id=${product.id})},
                      deleteUrl=@{/admin/products/{id}/delete(id=${product.id})}"
             class="product-card fade-in">
            <!-- Product Header -->
            <div class="flex justify-between items-start mb-3">
                <div>
                    <h3 class="text-lg font-bold text-gray-800" th:text="${product.name}"></h3>
                    <p class="text-sm text-gray-500 font-mono" th:text="'SKU: ' + ${product.sku}"></p>
                </div>
                <span th:class="${product.status.name() == 'ACTIVE'} ? 'badge-modern badge-success-modern' : 'badge-modern badge-inactive-modern'"
                      th:text="${product.status}"></span>
            </div>

            <!-- Product Info -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <p class="text-xs text-gray-500 mb-1">Price</p>
                    <p class="text-xl font-bold text-green-600"
                       th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 mb-1">Stock</p>
                    <p class="text-xl font-bold text-blue-600">
                        <i class="fas fa-warehouse mr-1"></i>
                        <span th:text="${product.stockQuantity}"></span>
                    </p>
                </div>
            </div>

            <!-- Actions - Reuse same URL variables -->
            <div class="flex gap-2">
                <a th:href="${viewUrl}"
                   class="btn-modern bg-blue-500 text-white flex-1 text-center">
                    <i class="fas fa-eye mr-1"></i>View
                </a>
                <a th:href="${editUrl}"
                   class="btn-modern bg-yellow-500 text-white flex-1 text-center">
                    <i class="fas fa-edit mr-1"></i>Edit
                </a>
                <!-- SOLID: Same modal behavior as desktop, not confirm() -->
                <button type="button"
                        class="btn-modern bg-red-500 text-white flex-1"
                        th:attr="data-delete-url=${deleteUrl},data-name=${product.name}"
                        onclick="showDeleteModal(this.dataset.deleteUrl, this.dataset.name)">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(products)}" class="text-center py-12">
            <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">No products found.</p>
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages != null and totalPages > 1}" class="flex justify-center items-center gap-2 mt-8 fade-in">
        <!-- Previous Button -->
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/products(page=${currentPage - 1})}"
           class="btn-modern bg-white/10 text-white text-sm">
            <i class="fas fa-chevron-left"></i> Prev
        </a>

        <!-- First Page -->
        <a th:href="@{/admin/products(page=0)}"
           th:class="${currentPage == 0} ? 'btn-modern bg-purple-600 text-white text-sm' : 'btn-modern bg-white/10 text-white text-sm'">
            1
        </a>

        <!-- Left Ellipsis -->
        <span th:if="${currentPage > 3}" class="text-white px-2">...</span>

        <!-- Pages around current page -->
        <span th:each="i : ${#numbers.sequence(
            (currentPage - 1 < 1 ? 1 : currentPage - 1),
            (currentPage + 1 >= totalPages - 1 ? totalPages - 2 : currentPage + 1)
        )}" th:if="${i >= 1 and i < totalPages - 1}">
            <a th:href="@{/admin/products(page=${i})}"
               th:text="${i + 1}"
               th:class="${i == currentPage} ? 'btn-modern bg-purple-600 text-white text-sm' : 'btn-modern bg-white/10 text-white text-sm'">
            </a>
        </span>

        <!-- Right Ellipsis -->
        <span th:if="${currentPage < totalPages - 4}" class="text-white px-2">...</span>

        <!-- Last Page -->
        <a th:if="${totalPages > 1}"
           th:href="@{/admin/products(page=${totalPages - 1})}"
           th:text="${totalPages}"
           th:class="${currentPage == totalPages - 1} ? 'btn-modern bg-purple-600 text-white text-sm' : 'btn-modern bg-white/10 text-white text-sm'">
        </a>

        <!-- Next Button -->
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/admin/products(page=${currentPage + 1})}"
           class="btn-modern bg-white/10 text-white text-sm">
            Next <i class="fas fa-chevron-right"></i>
        </a>
    </div>
    <p class="text-center text-gray-400 text-sm mt-3 fade-in"
       th:text="'Total: ' + ${totalElements != null ? totalElements : #lists.size(products)} + ' products'"></p>

</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="fixed inset-0 z-50 hidden justify-center items-center bg-black bg-opacity-50">
    <div class="bg-white rounded-lg shadow-lg max-w-sm w-full p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Confirm Deletion</h2>
        <p class="text-gray-600 mb-4">Are you sure you want to deactivate this product?</p>
        <div class="flex justify-end gap-2">
            <button id="cancelDelete" class="btn-modern bg-gray-300 text-gray-800 px-4 py-2 rounded-md">
                <i class="fas fa-times-circle mr-2"></i>Cancel
            </button>
            <form id="deleteForm" action="" method="post" class="inline">
                <button type="submit" class="btn-modern bg-red-500 text-white px-4 py-2 rounded-md">
                    <i class="fas fa-trash mr-2"></i>Deactivate
                </button>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer-admin}"></footer>

<script>
    function showDeleteModal(deleteUrl, productName) {
        const modal = document.getElementById('deleteModal');
        const form = document.getElementById('deleteForm');
        const cancelButton = document.getElementById('cancelDelete');

        form.setAttribute('action', deleteUrl);

        modal.classList.remove('hidden');
        modal.classList.add('flex');

        cancelButton.onclick = function () {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        modal.onclick = function (event) {
            if (event.target === modal) {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        };
    }
</script>

</body>
</html>
